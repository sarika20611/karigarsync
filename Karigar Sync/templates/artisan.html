<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Creator Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #8e44ad; --bg: #f5f6fa; --text: #2c3e50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .studio-card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--primary); font-size: 24px; margin-bottom: 5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .form-control { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary); outline: none; }
        .base-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .cam-btn { background: #34495e; color: white; margin-bottom: 10px; }
        .gallery-btn { background: #7f8c8d; color: white; margin-bottom: 15px; }
        .publish-btn { background: var(--primary); color: white; margin-top: 10px; }
        #cameraView, #imagePreview { width: 100%; border-radius: 8px; display: none; margin-top: 10px; transform: scaleX(-1); }
        #imagePreview { transform: none; }
        #qrResult { margin-top: 25px; padding: 20px; border: 2px dashed #dcdde1; border-radius: 12px; text-align: center; display: none; }
        #qrcode { display: flex; justify-content: center; margin: 15px 0; }
        .custom-material-box { display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="studio-card">
    <div class="header">
        <h1 id="titleText">✨ Heritage Creator Studio</h1>
        <p>Digitize your handmade craft items instantly</p>
    </div>

    <!-- Hidden file elements for handling images -->
    <input type="file" id="galleryInput" accept="image/*" style="display: none;" onchange="handleGalleryUpload(event)">

    <div class="form-group">
        <label id="idLabel">Assigned Product ID</label>
        <input type="text" id="productId" class="form-control" placeholder="e.g. ART-8832" required>
    </div>

    <div class="form-group">
        <label id="artisanLabel">Artisan Name</label>
        <input type="text" id="artisanName" class="form-control" placeholder="Your name" required>
    </div>

    <div class="form-group">
        <label id="materialLabel">Craft Material Used</label>
        <select id="materialSelect" class="form-control" onchange="toggleMaterialInput()">
            <option value="Terracotta Clay">Terracotta Clay</option>
            <option value="Natural Jute">Natural Jute</option>
            <option value="Raw Bamboo/Wood">Raw Bamboo/Wood</option>
            <option value="Woolen Knits">Woolen Knits/Crochet</option>
            <option value="Soft Felt Fabric">Soft Felt Fabric</option>
            <option value="CUSTOM">Other (Type Your Own...)</option>
        </select>
        <div id="customMaterialWrapper" class="custom-material-box">
            <input type="text" id="customMaterialInput" class="form-control" placeholder="Enter your custom material name">
        </div>
    </div>

    <div class="form-group">
        <label id="hoursLabel">Hours Invested (Max 50 Hours)</label>
        <input type="number" id="hoursInvested" class="form-control" min="1" max="50" value="5" oninput="calculateDynamicPrice()">
    </div>

    <div class="form-group" style="background: #f8f9fa; padding: 15px; border-radius: 8px;">
        <label id="lblPrice" style="margin-bottom: 2px;">Final Listing Price (Customizable)</label>
        <span style="font-size: 18px; font-weight: bold; color: #27ae60;">₹ <input type="number" id="priceLabel" value="50" style="font-size: 18px; font-weight: bold; color: #27ae60; border: none; background: transparent; width: 80px;" oninput="restrictCustomPrice()"></span>
    </div>

    <div class="form-group">
        <label>Product Visual Capture</label>
        <button class="base-btn cam-btn" onclick="startCamera()"><i class="fa-solid fa-camera"></i> Open Camera</button>
        <button class="base-btn gallery-btn" onclick="triggerGallery()"><i class="fa-solid fa-folder-open"></i> Attach from Gallery</button>
        <video id="cameraView" autoplay playsinline></video>
        <img id="imagePreview" alt="Captured preview">
        <button class="base-btn cam-btn" id="snapBtn" style="display:none; margin-top:10px; background:#e74c3c;" onclick="takeSnapshot()"><i class="fa-solid fa-circle"></i> Capture Photo</button>
    </div>

    <button class="base-btn publish-btn" id="submitBtn" onclick="publishProduct()">✨ Publish & Generate QR</button>

    <div id="qrResult">
        <h3 id="successTitle">✨ Live Sync Successful!</h3>
        <div id="qrcode"></div>
        <button class="base-btn" style="background:#2c3e50; margin-bottom: 10px;" id="nextItemBtn" onclick="resetForm()">Add Next Item</button>
        <a href="/buyer" class="base-btn" style="background:#27ae60; text-decoration:none; display:block;" id="goToMarketBtn">🛒 Go to Marketplace</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    let currentStreamRef = null;
    let finalCapturedImageBase64 = "";
    let systemCalculatedBase = 50;

    function toggleMaterialInput() {
        const selectValue = document.getElementById('materialSelect').value;
        const customWrapper = document.getElementById('customMaterialWrapper');
        if (selectValue === 'CUSTOM') {
            customWrapper.style.display = 'block';
        } else {
            customWrapper.style.display = 'none';
        }
    }

    function getSelectedMaterial() {
        const selectValue = document.getElementById('materialSelect').value;
        if (selectValue === 'CUSTOM') {
            return document.getElementById('customMaterialInput').value || "Handcrafted Material";
        }
        return selectValue;
    }

    function calculateDynamicPrice() {
        let hours = parseInt(document.getElementById('hoursInvested').value) || 0;
        if (hours > 50) { hours = 50; document.getElementById('hoursInvested').value = 50; }
        systemCalculatedBase = 50 + (hours * 15);
        document.getElementById('priceLabel').value = systemCalculatedBase;
    }

    function restrictCustomPrice() {
        let enteredPrice = parseFloat(document.getElementById('priceLabel').value) || 0;
        if (enteredPrice < systemCalculatedBase) {
            document.getElementById('priceLabel').value = systemCalculatedBase;
        }
    }

    async function startCamera() {
        document.getElementById('imagePreview').style.display = 'none';
        const video = document.getElementById('cameraView');
        video.style.display = 'block';
        if(currentStreamRef) { currentStreamRef.getTracks().forEach(track => track.stop()); }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            currentStreamRef = stream;
            video.srcObject = stream;
            document.getElementById('snapBtn').style.display = 'flex';
        } catch (err) {
            alert("Camera access blocked. Please check your system permissions or use the Attach from Gallery option.");
        }
    }

    function takeSnapshot() {
        const video = document.getElementById('cameraView');
        const img = document.getElementById('imagePreview');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        finalCapturedImageBase64 = canvas.toDataURL('image/jpeg');
        img.src = finalCapturedImageBase64;
        img.style.display = 'block';
        video.style.display = 'none';
        document.getElementById('snapBtn').style.display = 'none';
        if (currentStreamRef) { currentStreamRef.getTracks().forEach(track => track.stop()); }
    }

    function triggerGallery() {
        document.getElementById('galleryInput').click();
    }

    function handleGalleryUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            finalCapturedImageBase64 = e.target.result;
            const img = document.getElementById('imagePreview');
            img.src = finalCapturedImageBase64;
            img.style.display = 'block';
            document.getElementById('cameraView').style.display = 'none';
            document.getElementById('snapBtn').style.display = 'none';
            if (currentStreamRef) { currentStreamRef.getTracks().forEach(track => track.stop()); }
        };
        reader.readAsDataURL(file);
    }

    async function publishProduct() {
        const pId = document.getElementById('productId').value.trim();
        const aName = document.getElementById('artisanName').value.trim();
        const material = getSelectedMaterial();
        const hours = document.getElementById('hoursInvested').value;
        const price = document.getElementById('priceLabel').value;

        if(!pId || !aName || !material) { alert("Please complete all fields!"); return; }
        if(!finalCapturedImageBase64) { alert("Please take a photo or attach an image from your gallery first!"); return; }

        const payload = { id: pId, artisan: aName, material: material, hours: hours, price: price, img: finalCapturedImageBase64 };
        
        try {
            const res = await fetch('/api/sync_product', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await res.json();
            if(data.status === "success") {
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById('qrcode'), { text: data.qr_data, width: 140, height: 140 });
                document.getElementById('qrResult').style.display = 'block';
                document.getElementById('submitBtn').disabled = true;
            } else { alert("Sync Error: " + data.message); }
        } catch(e) { alert("Failed to connect to cloud sync stream."); }
    }

    function resetForm() {
        document.getElementById('productId').value = "";
        document.getElementById('artisanName').value = "";
        document.getElementById('customMaterialInput').value = "";
        document.getElementById('materialSelect').selectedIndex = 0;
        toggleMaterialInput();
        document.getElementById('hoursInvested').value = "5";
        document.getElementById('priceLabel').value = "50";
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('qrResult').style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
        finalCapturedImageBase64 = "";
    }
</script>
</body>
</html>
